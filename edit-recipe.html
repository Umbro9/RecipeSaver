<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Recipe</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="logo">
    <span>Recipe Saver</span>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="recipes.html">Recipes</a>
    <a href="add-recipe.html">Add Recipe</a>
  </nav>
</header>

<main class="page-content">

  <section class="page-hero">
    <span>Edycja przepisu</span>

    <h1>Edytuj swój przepis</h1>

    <p>
      Zmień składniki, instrukcje lub nazwę przepisu.
    </p>
  </section>

  <form class="recipe-form" id="editForm">

    <label>
      <span>Tytuł</span>
      <input type="text" name="title" placeholder="Tytuł">
    </label>

    <label>
      <span>Składniki</span>
      <textarea name="ingredients" placeholder="Składniki"></textarea>
    </label>

    <label>
      <span>Przygotowanie</span>
      <textarea name="instructions" placeholder="Przygotowanie"></textarea>
    </label>

    <button type="submit" class="btn">
      Zapisz zmiany
    </button>
              <button type="button" id="deleteBtn" class="btn" style="float: right;">
              Usuń przepis
          </button>

  </form>

</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/edit-recipe.js"></script>

</body>
</html>
